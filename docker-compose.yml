services:
  finance-inspector:
    image: colgatroid/finance-inspector:latest
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600
    restart: unless-stopped
