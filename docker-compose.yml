#pulls the latest image from docker hub
#Maps port 8501 on the host → 8501 in the container
#Mounts ./data from the host into /app/data in the container — this is
#  how the SQLite database and uploaded PDFs survive container restarts
services:
  finance-inspector:
    image: colgatroid/finance-inspector:latest
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600
    restart: unless-stopped
